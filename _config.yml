title: helsachan.github.io
description: >- # this means to ignore newlines until "baseurl:"
  Welcome to my page! Thanks for visiting!
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://helsachan.github.io" # the base hostname & protocol for your site, e.g. http://example.com
linkedin_username: helsachan
github_username:  helsachan
github: [metadata]
logo: "/image.png"

# Build settings
locale: "en-US"
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "dirt"
repository: helsachan/helsachan.github.io
include: ["_pages"]
plugins:
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: posts
    values:
      read_time: true
      show_date: true
      layout: posts
      
breadcrumbs: true
comments:
  provider: "utterances"
  utterances:
    theme: "github-light" # "github-dark"
    issue_term: "pathname"
masthead_title: "helsachan.github.io"
search: true